<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MT Monogram Logo</title>
  <desc id="desc">Circular Mithun Talukdar MT monogram logo with blue and purple gradient ring.</desc>
  <defs>
    <linearGradient id="ring" x1="84" y1="92" x2="430" y2="421" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.46" stop-color="#0EA5E9"/>
      <stop offset="0.72" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="mFace" x1="125" y1="143" x2="283" y2="351" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21E6FF"/>
